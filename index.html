<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Audio, Video & Paint Group Room</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #181825;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1e1e2e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 800px;
            width: 100%;
            text-align: center;
            border: 1px solid #313244;
            position: relative;
        }
        .lang-switcher {
            position: absolute;
            top: 15px;
            right: 15px;
        }
        .lang-btn {
            background: #313244;
            border: 1px solid #45475a;
            color: #cdd6f4;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-left: 5px;
        }
        .lang-btn.active {
            background: #89b4fa;
            color: #11111b;
            font-weight: bold;
        }
        h1 {
            font-size: 1.8rem;
            margin-top: 10px;
            margin-bottom: 5px;
            color: #89b4fa;
        }
        .room-badge {
            display: inline-block;
            background: #313244;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #a6e3a1;
            margin-bottom: 20px;
        }
        .status {
            margin: 15px 0;
            font-size: 0.95rem;
            color: #bac2de;
            background: #11111b;
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid #f9e2af;
        }
        
        /* Кнопки управления */
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
        }
        .main-btn {
            background: #a6e3a1;
            color: #11111b;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .main-btn:hover { background: #94e2d5; }
        .main-btn:active { transform: scale(0.98); }

        .control-btn {
            background: #313244;
            color: #cdd6f4;
            border: 1px solid #45475a;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            display: none; /* Будут показаны при коннекте */
        }
        .control-btn:hover { background: #45475a; }
        .control-btn.muted {
            background: #f38ba8;
            color: #11111b;
            border-color: #f38ba8;
        }
        .control-btn.fix-btn {
            background: #fab387;
            color: #11111b;
            border-color: #fab387;
        }
        .control-btn.fix-btn:hover { background: #f9e2af; }

        /* Окно авторизации имени */
        .overlay-card {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(17, 17, 27, 0.85);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .name-card {
            background: #1e1e2e;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #313244;
            max-width: 350px; width: 100%;
            text-align: center;
        }
        .name-card input {
            width: 100%;
            padding: 10px;
            background: #11111b;
            border: 1px solid #45475a;
            color: #cdd6f4;
            border-radius: 6px;
            margin-top: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Видео сетка */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .video-box {
            position: relative;
            background: #11111b;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #313244;
            aspect-ratio: 4/3;
        }
        .video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-box.local-stream video {
            transform: scaleX(-1);
        }
        .video-label {
            position: absolute;
            bottom: 8px; left: 8px;
            background: rgba(17, 17, 27, 0.7);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            color: #cdd6f4;
            font-weight: 500;
        }

        /* Текстовый чат */
        .chat-container {
            display: none;
            background: #11111b;
            border: 1px solid #313244;
            border-radius: 10px;
            margin-bottom: 25px;
            padding: 15px;
            text-align: left;
        }
        .chat-messages {
            height: 120px;
            overflow-y: auto;
            font-size: 0.9rem;
            margin-bottom: 10px;
            padding-right: 5px;
        }
        .chat-messages div { margin-bottom: 6px; line-height: 1.3; }
        .chat-input-row { display: flex; gap: 8px; }
        .chat-input-row input {
            flex: 1;
            background: #1e1e2e;
            border: 1px solid #45475a;
            color: #cdd6f4;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .chat-send-btn {
            background: #89b4fa;
            color: #11111b;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Холст */
        .paint-container {
            display: none;
            background: #11111b;
            border: 1px solid #313244;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
        }
        .paint-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tool-group { display: flex; align-items: center; gap: 8px; }
        .paint-toolbar input[type="color"] {
            border: none; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; background: none;
        }
        .paint-toolbar input[type="range"] {
            width: 70px; accent-color: #89b4fa;
        }
        .history-btn {
            background: #313244; color: #cdd6f4; border: 1px solid #45475a;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
        }
        .history-btn:hover { background: #45475a; }
        .clear-btn { border-color: #f38ba8; color: #f38ba8; }
        .clear-btn:hover { background: rgba(243, 139, 168, 0.1); }
        canvas {
            background: #1e1e2e;
            border: 1px solid #313244;
            border-radius: 8px;
            width: 100%;
            height: auto;
            max-width: 100%;
            touch-action: none;
        }

        /* Системные логи */
        .toggle-log-btn {
            background: none; border: none; color: #6c7086; cursor: pointer; font-size: 0.85rem; text-decoration: underline; margin-top: 10px;
        }
        .toggle-log-btn:hover { color: #a6adc8; }
        .log-section {
            display: none; background: #11111b; border: 1px solid #313244; border-radius: 10px; padding: 15px; margin-top: 15px; text-align: left;
        }
        .log-actions { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .log-title { font-size: 0.85rem; font-weight: bold; color: #f5e0dc; text-transform: uppercase; }
        .copy-btn {
            background: #313244; color: #cdd6f4; border: 1px solid #45475a; padding: 4px 10px; border-radius: 5px; font-size: 0.75rem; cursor: pointer;
        }
        .copy-btn:hover { background: #45475a; }
        .console-box {
            font-family: 'Courier New', Courier, monospace; font-size: 0.8rem; height: 150px; overflow-y: auto; color: #a6adc8; word-break: break-all; line-height: 1.4;
        }

        /* Оверлей блокировки звука */
        .audio-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(17,17,27,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; padding: 20px;
        }
        .audio-modal {
            background: #1e1e2e; padding: 25px; border-radius: 12px; text-align: center; max-width: 360px; border: 1px solid #f38ba8;
        }
        .audio-modal p { margin: 0 0 20px 0; font-size: 0.95rem; line-height: 1.4; }
        .audio-modal button {
            background: #f38ba8; color: #11111b; border: none; padding: 10px 20px; font-size: 0.95rem; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%;
        }
        .audio-modal button:hover { background: #eba0b8; }
    </style>
</head>
<body>

<div id="nameSetupOverlay" class="overlay-card">
    <div class="name-card" id="nameSetupCard">
        <h3 id="txt-name-prompt" style="margin: 0; color: #89b4fa;">Enter nickname & select role:</h3>
        <input type="text" id="usernameInput" placeholder="Your name..." maxlength="20" value="User">
    </div>
</div>

<div id="audioActivationOverlay" class="audio-overlay">
    <div class="audio-modal">
        <p id=\"txt-modal-alert\">Your browser blocked background audio. Click to activate stream.</p>
        <button id="audioActivateBtn">Unmute Audio</button>
    </div>
</div>

<div class="card">
    <div class="lang-switcher">
        <button class="lang-btn" id="btn-en" onclick="changeLanguage('en')">EN</button>
        <button class="lang-btn" id="btn-uk" onclick="changeLanguage('uk')">UK</button>
        <button class="lang-btn" id="btn-ru" onclick="changeLanguage('ru')">RU</button>
    </div>

    <h1 id="txt-title">P2P Video & Paint Room</h1>
    <div class="room-badge" id="txt-badge">Direct Mesh Bridge</div>
    
    <div class="status" id="statusText">Choose your role below to initialize...</div>
    
    <div class="controls-row">
        <button id="muteBtn" class="control-btn">Mute Mic</button>
        <button id="camBtn" class="control-btn">Turn Off Cam</button>
        <button id="flipCamBtn" class="control-btn">Flip Cam</button>
        <button id="fixBtn" class="control-btn fix-btn">⚡ Fix Connection</button>
    </div>

    <div id="videoGrid" class="video-grid"></div>
    
    <div id="chatContainer" class="chat-container">
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Type a message..." maxlength="500">
            <button id="sendMsgBtn" class="chat-send-btn">Send</button>
        </div>
    </div>

    <div id="paintContainer" class="paint-container">
        <div class="paint-toolbar">
            <div class="tool-group">
                <input type="color" id="brushColor" value="#89b4fa">
                <input type="range" id="brushSize" min="1" max="40" value="5">
                <input type="range" id="brushOpacity" min="0.1" max="1.0" step="0.1" value="1.0">
            </div>
            <div class="tool-group">
                <button id="undoBtn" class="history-btn">↶</button>
                <button id="redoBtn" class="history-btn">↷</button>
                <button id="clearBtn" class="history-btn clear-btn">🗑️ Clear</button>
            </div>
        </div>
        <canvas id="paintCanvas" width="500" height="320"></canvas>
    </div>

    <button id="toggleLogBtn" class="toggle-log-btn">Show Console Logs</button>
    
    <div id="logSection" class="log-section">
        <div class="log-actions">
            <div class="log-title">Peer Log Network Monitor</div>
            <button id="copyLogBtn" class="copy-btn">Copy Logs</button>
        </div>
        <div id="log" class="console-box">> Engine awaiting deployment...</div>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="app.js"></script>
</body>
</html>
