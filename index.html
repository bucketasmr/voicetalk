<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глобальная Аудио Комната</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #181825;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1e1e2e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid #313244;
        }
        h1 { margin-top: 0; color: #a6e3a1; font-size: 24px; }
        .room-badge {
            background: #313244;
            color: #f5c2e7;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
        button {
            background: #a6e3a1;
            color: #11111b;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, background 0.2s;
        }
        button:hover { background: #94e2d5; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #585b70; color: #a6adc8; cursor: not-allowed; }
        .status {
            font-size: 15px;
            color: #bac2de;
            margin: 20px 0;
            min-height: 22px;
        }
        #log {
            background: #11111b;
            padding: 12px;
            border-radius: 8px;
            height: 120px;
            overflow-y: auto;
            font-size: 12px;
            text-align: left;
            color: #f5e0dc;
            font-family: monospace;
            border: 1px solid #313244;
        }
        /* Сюда будут динамически добавляться аудио-теги для собеседников */
        #remoteAudioContainer { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>Глобальный Аудио Чат</h1>
    <div class="room-badge">Комната: Общая (World Wide)</div>
    
    <button id="joinBtn">Войти в комнату</button>
    
    <div class="status" id="statusText">Нажмите кнопку для подключения...</div>
    
    <div id="remoteAudioContainer"></div>
    <div id="log">Система готова.</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="app.js"></script>

</body>
</html>
