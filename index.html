<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Audio & Text Room</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #181825;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1e1e2e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid #313244;
            position: relative;
        }
        .lang-switcher {
            position: absolute;
            top: 15px;
            right: 15px;
        }
        .lang-btn {
            background: #313244;
            color: #cdd6f4;
            border: 1px solid #45475a;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 2px;
            font-weight: bold;
        }
        .lang-btn.active {
            background: #f5c2e7;
            color: #11111b;
            border-color: #f5c2e7;
        }
        h1 { margin-top: 15px; color: #a6e3a1; font-size: 24px; }
        .room-badge {
            background: #313244;
            color: #f5c2e7;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
        button.main-btn {
            background: #a6e3a1;
            color: #11111b;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, background 0.2s;
        }
        button.main-btn:hover { background: #94e2d5; }
        button.main-btn:active { transform: scale(0.98); }
        button.main-btn:disabled { background: #585b70; color: #a6adc8; cursor: not-allowed; }
        
        .mute-btn {
            display: none;
            background: #f9e2af;
            color: #11111b;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            transition: transform 0.1s, background 0.2s;
        }
        .mute-btn:active { transform: scale(0.98); }
        .mute-btn.muted {
            background: #f38ba8;
            color: #11111b;
        }

        .status {
            font-size: 15px;
            color: #bac2de;
            margin: 20px 0;
            min-height: 22px;
        }

        /* Стили текстового P2P чата */
        .chat-container {
            display: none;
            margin-top: 15px;
            border: 1px solid #313244;
            border-radius: 8px;
            background: #11111b;
            padding: 12px;
            text-align: left;
        }
        .chat-messages {
            height: 150px;
            overflow-y: auto;
            font-size: 13px;
            color: #cdd6f4;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .chat-input-row {
            display: flex;
            gap: 8px;
        }
        .chat-input-row input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #45475a;
            background: #1e1e2e;
            color: #cdd6f4;
            font-size: 13px;
        }
        .chat-input-row input:focus {
            outline: none;
            border-color: #f5c2e7;
        }
        .chat-send-btn {
            background: #f5c2e7;
            color: #11111b;
            border: none;
            padding: 0 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-send-btn:hover { background: #eba0b8; }

        /* Панель консоли скрыта изначально */
        .log-container {
            display: none;
            margin-top: 15px;
            text-align: right;
        }
        .copy-btn, .toggle-log-btn {
            background: #313244;
            color: #f5e0dc;
            border: 1px solid #45475a;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 6px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .copy-btn:hover, .toggle-log-btn:hover {
            background: #45475a;
            color: #cdd6f4;
        }
        .toggle-log-btn {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            font-size: 13px;
        }
        #log {
            background: #11111b;
            padding: 12px;
            border-radius: 8px;
            height: 140px;
            overflow-y: auto;
            font-size: 11px;
            text-align: left;
            color: #f5e0dc;
            font-family: monospace;
            border: 1px solid #313244;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .audio-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(17, 17, 27, 0.9);
            backdrop-filter: blur(6px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .audio-modal {
            background: #313244;
            padding: 25px 35px;
            border-radius: 12px;
            border: 2px solid #f5c2e7;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 320px;
            width: 100%;
        }
        .audio-modal p {
            margin: 0 0 15px 0;
            font-size: 16px;
            font-weight: 500;
            color: #cdd6f4;
        }
        .audio-modal input.name-input {
            width: 90%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #45475a;
            background: #1e1e2e;
            color: #cdd6f4;
            margin-bottom: 15px;
            text-align: center;
            font-size: 16px;
        }
        .audio-modal button {
            background: #f5c2e7;
            color: #11111b;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }
        .audio-modal button:hover { background: #eba0b8; }
        #remoteAudioContainer { display: none; }
    </style>
</head>
<body>

<div id="nameSetupOverlay" class="audio-overlay" style="display: flex;">
    <div class="audio-modal">
        <p id="txt-name-prompt">Enter your nickname to start:</p>
        <input type="text" id="usernameInput" class="name-input" maxlength="20" placeholder="Your name...">
        <button id="saveNameBtn">Confirm</button>
    </div>
</div>

<div id="audioActivationOverlay" class="audio-overlay">
    <div class="audio-modal">
        <p id="txt-modal-alert">Your browser blocked background audio. Click to activate voice stream.</p>
        <button id="audioActivateBtn">Unmute Audio</button>
    </div>
</div>

<div class="card">
    <div class="lang-switcher">
        <button class="lang-btn" id="btn-en" onclick="changeLanguage('en')">EN</button>
        <button class="lang-btn" id="btn-uk" onclick="changeLanguage('uk')">UK</button>
        <button class="lang-btn" id="btn-ru" onclick="changeLanguage('ru')">RU</button>
    </div>

    <h1 id="txt-title">Global Audio Chat</h1>
    <div class="room-badge" id="txt-badge">Room: World Wide</div>
    
    <button id="joinBtn" class="main-btn">Join Room</button>
    <button id="muteBtn" class="mute-btn">Mute Mic</button>
    
    <div class="status" id="statusText">Click button to connect...</div>
    
    <div id="chatContainer" class="chat-container">
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-row">
            <input type="text" id="chatInput" placeholder="Type a message..." maxlength="500">
            <button id="sendMsgBtn" class="chat-send-btn">Send</button>
        </div>
    </div>

    <button id="toggleLogBtn" class="toggle-log-btn">Show Console Logs</button>
    
    <div id="remoteAudioContainer"></div>
    
    <div id="logSection" class="log-container">
        <button id="copyLogBtn" class="copy-btn">Copy Logs</button>
        <div id="log">System ready.</div>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="app.js"></script>

</body>
</html>
