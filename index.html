<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Audio Room</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #181825;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1e1e2e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid #313244;
            position: relative;
        }
        .lang-switcher {
            position: absolute;
            top: 15px;
            right: 15px;
        }
        .lang-btn {
            background: #313244;
            color: #cdd6f4;
            border: 1px solid #45475a;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 2px;
            font-weight: bold;
        }
        .lang-btn.active {
            background: #f5c2e7;
            color: #11111b;
            border-color: #f5c2e7;
        }
        h1 { margin-top: 15px; color: #a6e3a1; font-size: 24px; }
        .room-badge {
            background: #313244;
            color: #f5c2e7;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
        button.main-btn {
            background: #a6e3a1;
            color: #11111b;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, background 0.2s;
        }
        button.main-btn:hover { background: #94e2d5; }
        button.main-btn:active { transform: scale(0.98); }
        button.main-btn:disabled { background: #585b70; color: #a6adc8; cursor: not-allowed; }
        .status {
            font-size: 15px;
            color: #bac2de;
            margin: 20px 0;
            min-height: 22px;
        }
        #log {
            background: #11111b;
            padding: 12px;
            border-radius: 8px;
            height: 160px;
            overflow-y: auto;
            font-size: 11px;
            text-align: left;
            color: #f5e0dc;
            font-family: monospace;
            border: 1px solid #313244;
            white-space: pre-wrap;
            word-break: break-all;
        }
        /* Всплывающее окно активации звука */
        .audio-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(17, 17, 27, 0.85);
            backdrop-filter: blur(4px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .audio-modal {
            background: #313244;
            padding: 25px 35px;
            border-radius: 12px;
            border: 2px solid #f5c2e7;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 320px;
        }
        .audio-modal p {
            margin: 0 0 20px 0;
            font-size: 16px;
            font-weight: 500;
            color: #cdd6f4;
        }
        .audio-modal button {
            background: #f5c2e7;
            color: #11111b;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }
        .audio-modal button:hover { background: #eba0b8; }
        #remoteAudioContainer { display: none; }
    </style>
</head>
<body>

<div id="audioActivationOverlay" class="audio-overlay">
    <div class="audio-modal">
        <p id="txt-modal-alert">Your browser blocked background audio. Click to activate voice stream.</p>
        <button id="audioActivateBtn">Unmute Audio</button>
    </div>
</div>

<div class="card">
    <div class="lang-switcher">
        <button class="lang-btn" id="btn-en" onclick="changeLanguage('en')">EN</button>
        <button class="lang-btn" id="btn-uk" onclick="changeLanguage('uk')">UK</button>
        <button class="lang-btn" id="btn-ru" onclick="changeLanguage('ru')">RU</button>
    </div>

    <h1 id="txt-title">Global Audio Chat</h1>
    <div class="room-badge" id="txt-badge">Room: World Wide</div>
    
    <button id="joinBtn" class="main-btn">Join Room</button>
    
    <div class="status" id="statusText">Click button to connect...</div>
    
    <div id="remoteAudioContainer"></div>
    <div id="log">System ready. Click 'Join Room'.</div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="app.js"></script>

</body>
</html>
